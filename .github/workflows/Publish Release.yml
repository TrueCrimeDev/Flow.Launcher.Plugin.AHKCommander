name: Publish Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/workflows/*'
      - 'README.md'
      - 'LICENSE'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read plugin version
        id: version
        uses: notiz-dev/github-action-json-property@release
        with:
          path: 'plugin.json'
          prop_path: 'Version'

      - name: Check tag does not already exist
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.prop }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle dependencies and zip plugin
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t ./lib
          zip -r Flow.Launcher.Plugin.AHKCommander.zip . \
            -x '*.git*' '*.github*' '*.zip' '*.md' 'LICENSE' '__pycache__/*'

      - name: Publish release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: 'Flow.Launcher.Plugin.AHKCommander.zip'
          tag_name: 'v${{ steps.version.outputs.prop }}'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
